<head>

<title>LinkHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#FAF7F2;color:#1C1410;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#C8BBAD;border-radius:4px}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rise{animation:rise .35s ease both}

header{background:#fff;border-bottom:1px solid #E8E0D5;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.hdr{max-width:1100px;margin:0 auto;padding:0 18px;height:54px;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:6px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#6D28D9,#EC4899);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0}
.logo-text{font-weight:900;font-size:17px;color:#1C1410;white-space:nowrap}
nav{display:flex;gap:5px;flex:1;overflow-x:auto}
nav::-webkit-scrollbar{height:0}
.nbtn{padding:6px 13px;border-radius:999px;border:1.5px solid #E8E0D5;background:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;color:#4A3F35}
.nbtn:hover{transform:translateY(-1px)}
.srch{display:flex;align-items:center;gap:6px;background:#FAF7F2;border:1px solid #E8E0D5;border-radius:8px;padding:5px 10px;flex-shrink:0}
.srch input{background:none;border:none;outline:none;font-size:11px;width:130px;color:#1C1410;font-family:inherit}
.nbell{position:relative;background:#FAF7F2;border:1px solid #E8E0D5;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:15px;flex-shrink:0}
.ndot{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:#E11D48;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:11px}

.wrap{max-width:1100px;margin:0 auto;padding:20px 18px;display:grid;grid-template-columns:215px 1fr;gap:20px}
aside{display:flex;flex-direction:column;gap:13px}
.card{background:#fff;border:1px solid #E8E0D5;border-radius:15px;padding:15px}
.clbl{font-size:10px;font-weight:700;color:#8C7B6E;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.me-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.me-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:11px;border-top:1px solid #E8E0D5;text-align:center}
.sq-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.jbtn{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;border:none;background:transparent;font-size:11px;font-weight:500;cursor:pointer;width:100%;color:#4A3F35;transition:all .15s;font-family:inherit}
.jbtn:hover{background:rgba(109,40,217,.06)}

.ft{height:26px;background:#1C1410;display:flex;align-items:center;padding:0 22px;gap:16px;flex-shrink:0}
.fdot{display:flex;align-items:center;gap:4px;font-size:9px;color:#6B5E52;font-family:monospace}

/* ZONE */
.zh{border-radius:18px;padding:24px 24px 50px;margin-bottom:-28px;position:relative;overflow:hidden}
.zlbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
.ztitle{font-size:23px;font-weight:900;margin:0 0 4px}
.zsub{font-size:12px;margin:0 0 14px;opacity:.8}
.ztabs{display:flex;gap:7px;flex-wrap:wrap}
.ztab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;border:1.5px solid transparent;font-family:inherit}
.zbody{background:#fff;border-radius:18px;border:1px solid #E8E0D5;padding:40px 24px 24px;box-shadow:0 4px 18px rgba(0,0,0,.06)}

/* ITEMS */
.ic{background:#FAF7F2;border:1px solid #E8E0D5;border-radius:12px;padding:14px 16px;margin-bottom:11px;transition:transform .2s,box-shadow .2s}
.ic:hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(0,0,0,.08)}
.irow{display:flex;gap:11px}
.chip{font-size:10px;font-weight:600;border-radius:20px;padding:2px 8px;display:inline-flex;border:1px solid transparent;margin:2px}
.abtn{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.acbtn{padding:7px 15px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.sk{border-radius:10px;padding:10px 11px;transition:transform .2s}
.sk:hover{transform:translateY(-1px)}
.skbars{display:flex;gap:3px;margin:5px 0 4px}
.skbar{width:13px;height:4px;border-radius:2px}
.hub-li{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;border:1.5px solid #E8E0D5;background:#fff;cursor:pointer;margin-bottom:7px;transition:all .17s}
.hub-li:hover{transform:translateY(-1px)}
.vcard{background:#FAF7F2;border:1px solid #E8E0D5;border-radius:11px;padding:13px 15px;margin-bottom:10px}
.cred{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E8E0D5;border-radius:10px;padding:11px 14px;margin-bottom:9px;transition:transform .2s}
.cred:hover{transform:translateY(-1px)}
.safe-c{background:#fff;border:1.5px solid #E8E0D5;border-radius:12px;padding:14px}
.shc{background:#FAF7F2;border:1px solid #E8E0D5;border-radius:13px;padding:15px 17px;margin-bottom:11px;transition:transform .2s}
.shc:hover{transform:translateY(-2px)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.gsafe{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:11px}
.hubgrid{display:grid;grid-template-columns:190px 1fr;gap:16px}
.fw{display:flex;flex-wrap:wrap;gap:6px}
.frow{display:flex;align-items:center;gap:8px}
.fbetw{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:7px}

/* ONBOARD */
#ob{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 18px;background:linear-gradient(160deg,#FAF7F2,#F0EBF8,#FAF7F2)}
.ob-logo{display:flex;align-items:center;gap:10px;margin-bottom:38px}
.ob-logo-i{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#6D28D9,#EC4899);display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff}
.ob-steps{display:flex;gap:7px;margin-bottom:28px}
.ob-pip{height:8px;border-radius:4px;transition:all .3s}
.ob-card{background:#fff;border:1px solid #E8E0D5;border-radius:22px;padding:32px 34px;max-width:540px;width:100%;box-shadow:0 18px 55px rgba(0,0,0,.09);display:flex;flex-direction:column;align-items:center;gap:20px}
.ob-title{font-size:26px;font-weight:900;color:#1C1410;text-align:center;line-height:1.2;margin-bottom:5px}
.ob-sub{font-size:13px;color:#4A3F35;text-align:center;line-height:1.6}
.ig{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:470px}
.ipill{padding:8px 15px;border-radius:999px;border:2px solid #E8E0D5;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .17s;color:#4A3F35;font-family:inherit}
.ipill:hover{transform:scale(1.04)}
.obn{width:100%;padding:12px;border:none;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;color:#fff;font-family:inherit}
.obb{background:none;border:none;color:#8C7B6E;font-size:12px;cursor:pointer;margin-top:-8px;font-family:inherit}
.spcard{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #E8E0D5;border-radius:11px;padding:11px 13px;box-shadow:0 2px 7px rgba(0,0,0,.05);margin-bottom:10px}
.fi{width:100%;max-width:430px;display:flex;flex-direction:column;gap:12px}
.fl{font-size:12px;font-weight:700;color:#4A3F35;display:block;margin-bottom:4px}
.finput{width:100%;background:#fff;border:1.5px solid #E8E0D5;border-radius:9px;padding:10px 12px;font-size:13px;color:#1C1410;outline:none;font-family:inherit}
.finput:focus{border-color:#6D28D9}
.hint{background:#EDE9FF;border:1px solid rgba(109,40,217,.18);border-radius:9px;padding:11px 13px}
.post-play{margin:9px 0 10px;height:170px;border-radius:14px;background:linear-gradient(135deg,#FCE7F3,#EDE9FE,#DBEAFE);display:flex;align-items:center;justify-content:center;gap:12px}
.play-btn{width:42px;height:42px;border-radius:50%;background:#fff;color:#E11D48;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 6px 20px rgba(0,0,0,.12)}

@media (max-width: 920px){
  .wrap{grid-template-columns:1fr}
  aside{order:2}
  .hubgrid{grid-template-columns:1fr}
}

@media (max-width: 720px){
  .hdr{padding:0 12px;gap:8px}
  .srch{display:none}
  .zbody{padding:36px 16px 18px}
  .zh{padding:20px 16px 46px}
  .ob-card{padding:24px 18px}
  .g2{grid-template-columns:1fr}
}
</style>
</head>
